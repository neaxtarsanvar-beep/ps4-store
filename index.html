<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odlar Yurdu Store</title>
    <style>
        /* Professional Azərbaycan/Odlar Yurdu Palitrası: Kömür Qarası, Alov Qırmızısı və Qızılı Sərhədlər */
        :root {
            --bg-color: #0b0c10;
            --panel-color: #1f2833;
            --primary-red: #e63946;
            --gold-accent: #c5a880;
            --text-main: #ffffff;
            --text-muted: #c5c6c7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sol Panel - Kateqoriyalar */
        .sidebar {
            width: 25%;
            background-color: var(--panel-color);
            border-right: 3px solid var(--primary-red);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .store-logo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-red);
            text-shadow: 0 0 10px rgba(230, 57, 70, 0.5);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .store-sub {
            text-align: center;
            font-size: 11px;
            color: var(--gold-accent);
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .cat-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 15px 20px;
            text-align: left;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .cat-btn:hover, .cat-btn.active {
            background-color: var(--primary-red);
            color: white;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.4);
        }

        /* Sağ Panel - Əsas Ekran */
        .main-content {
            width: 75%;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        /* Üst Panel - Axtarış sətiri */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .search-box {
            width: 60%;
            background-color: var(--panel-color);
            border: 1px solid var(--gold-accent);
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 8px rgba(230, 57, 70, 0.5);
        }

        .status-badge {
            background-color: #2a9d8f;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        /* Oyunların Listələndiyi Yer */
        .games-list {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Professional Oyun Kartı Dizaynı (Linklər Tamamilə Gizlidir) */
        .game-card {
            background-color: var(--panel-color);
            border-left: 5px solid var(--gold-accent);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .game-card:hover {
            border-left-color: var(--primary-red);
            transform: scale(1.005);
        }

        .game-info h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: var(--text-main);
        }

        .game-meta {
            font-size: 14px;
            color: var(--gold-accent);
        }

        .download-btn {
            background-color: var(--primary-red);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .download-btn:hover {
            background-color: #b72430;
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.6);
        }

        /* Səliqəli Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--panel-color); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="store-logo">🔥 ODLAR YURDU</div>
        <div class="store-sub">Y E R L İ  S T O R E</div>
        <div id="categories-container" style="display: flex; flex-direction: column;"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <input type="text" id="search-input" class="search-box" placeholder="Oyun adı yazın (Məsələn: GTA)...">
            <div class="status-badge">🟢 Versiya: 1.0.0 Pro</div>
        </div>

        <div class="games-list" id="games-container"></div>
    </div>

    <script>
        // Store-un əsas bazası birbaşa buradadır. Yeni oyun olanda bura əlavə edəcəyik.
        const storeData = {
          "categories": [
            {"id": "all", "name": "🇦🇿 Hamısı"},
            {"id": "ps4_games", "name": "🎮 PS4 Oyunları"},
            {"id": "dlc_updates", "name": "➕ DLC & Yenilənmələr"},
            {"id": "homebrew_apps", "name": "🛠️ Homebrew"}
          ],
          "games": [
            {
              "id": 1,
              "title": "Grand Theft Auto V [EU] [EN] [1.27] [SP]",
              "category": "ps4_games",
              "size": "46.5 GB",
              "pkg_url": "https://archive.org/download/ps4-fpkg-collection-english-g/Grand%20Theft%20Auto%20V%20-%20%5BEU%5D%20%5BEN%5D%20%5B1.27%5D%20%5BSP%5D.pkg"
            }
          ]
        };

        let currentCategory = "all";

        function initStore() {
            renderCategories();
            renderGames();
        }

        // Kateqoriyaları yükləyən funksiya
        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            storeData.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${currentCategory === cat.id ? 'active' : ''}`;
                btn.innerText = cat.name;
                btn.onclick = () => {
                    currentCategory = cat.id;
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGames();
                };
                container.appendChild(btn);
            });
        }

        // Oyunları professional kartlar şəklində göstərən funksiya
        function renderGames(searchQuery = "") {
            const container = document.getElementById('games-container');
            container.innerHTML = '';

            let filtered = storeData.games;

            // Kateqoriya filtri
            if (currentCategory !== "all") {
                filtered = filtered.filter(g => g.category === currentCategory);
            }

            // Canlı axtarış filtri
            if (searchQuery) {
                filtered = filtered.filter(g => g.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            if(filtered.length === 0) {
                container.innerHTML = `<p style="color:var(--text-muted); text-align:center; margin-top:50px;">Oyun tapılmadı.</p>`;
                return;
            }

            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-info">
                        <h3>${game.title}</h3>
                        <div class="game-meta">Həcm: <b>${game.size}</b> | Format: <b>.PKG</b></div>
                    </div>
                    <button class="download-btn" onclick="downloadPKG('${game.pkg_url}')">YÜKLƏ</button>
                `;
                container.appendChild(card);
            });
        }

        // Gizli yükləmə mexanizmi - İstifadəçi linki görmür, yükləmə birbaşa arxa planda tetiklenir
        function downloadPKG(url) {
            window.location.href = url;
        }

        // Axtarış yerinə hərf yazıldıqca işə düşən dinləyici
        document.getElementById('search-input').addEventListener('input', (e) => {
            renderGames(e.target.value);
        });

        // Sistemi başlat
        initStore();
    </script>
</body>
</html>
