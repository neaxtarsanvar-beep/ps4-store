<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odlar Yurdu Store</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #45f3ff;
            text-shadow: 0 0 15px #45f3ff;
            font-size: 2.8em;
            margin-bottom: 5px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 10px;
        }
        .game-card {
            background: #1f2833;
            border: 2px solid #1f2833;
            border-radius: 12px;
            width: 220px;
            padding: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            transition: 0.3s ease-in-out;
        }
        .game-card:hover {
            border-color: #45f3ff;
            transform: translateY(-5px);
        }
        .game-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 8px;
        }
        .game-title {
            font-size: 1.1em;
            margin: 15px 0 10px 0;
            font-weight: bold;
            height: 45px;
        }
        .btn-download {
            display: block;
            background: #45f3ff;
            color: #000000;
            padding: 12px 0;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🔥 ODLAR YURDU STORE 🔥</h1>
    <p style="color: #c5a880;">JSON Məlumat Bazalı Mağaza Şablonu</p>
    <hr style="border: 1px solid #1f2833; width: 85%; margin-bottom: 40px;">

    <div class="container" id="maza-container"></div>

    <script>
        // Eyni qovluqdakı oyunlar.json faylını oxuyuruq
        fetch('oyunlar.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('maza-container');
                data.forEach(oyun => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <img class="game-img" src="${oyun.sekil}" alt="${oyun.ad}">
                        <div class="game-title">${oyun.ad}</div>
                        <a href="${oyun.link}" class="btn-download">PKG YÜKLƏ</a>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => console.error("JSON oxunarkən xəta baş verdi:", err));
    </script>

</body>
</html>
