<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odlar Yurdu Store - Global PS4 Portal</title>
    <style>
        /* Qlobal Qaranlıq və Alov Mövzusu */
        body { 
            background-color: #03050a; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #2b0c02 0%, #03050a 60%);
        }

        /* Alovlu Neon Header */
        header { 
            background: linear-gradient(135deg, #120502, #260a02);
            padding: 30px; 
            text-align: center; 
            border-radius: 16px; 
            margin-bottom: 30px; 
            border: 2px solid #ff4500;
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.4), inset 0 0 15px rgba(255, 69, 0, 0.2);
            position: relative;
        }

        .logo { 
            font-size: 36px; 
            font-weight: 900; 
            letter-spacing: 4px; 
            color: #ffffff;
            text-shadow: 0 0 10px #ff4500, 0 0 20px #ff8c00, 0 0 30px #ff0000;
        }

        .subtitle {
            color: #ffaa73;
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* 🔥 ULTRA PROFESSIONAL AXTARIŞ PANELİ 🔥 */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px auto;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 16px 25px;
            padding-left: 50px;
            background-color: #0b0e1a;
            border: 2px solid #222b45;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        /* Axtarış xanasına klikləyəndə neon alov parıltısı */
        .search-box:focus {
            border-color: #ff4500;
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.5);
            background-color: #111524;
        }

        /* Axtarış ikonunun (böyüdücü şüşə) yerləşməsi */
        .search-container::before {
            content: '🔍';
            position: absolute;
            left: 20px;
            top: 16px;
            font-size: 18px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .search-container:focus-within::before {
            opacity: 1;
            filter: drop-shadow(0 0 5px #ff4500);
        }

        /* Oyun Kartları Grid Sistemi */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        /* Peşəkar Alovlu Kart Dizaynı */
        .card { 
            background: linear-gradient(185deg, #111524 0%, #0b0e1a 100%); 
            border: 1px solid #222b45; 
            border-radius: 16px; 
            padding: 0; 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .card-banner {
            height: 140px;
            background: linear-gradient(45deg, #ff4500, #ff0055);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .card:hover { 
            border-color: #ff4500; 
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 69, 0, 0.3);
        }

        .card-content { padding: 25px; }

        .title { 
            font-size: 20px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta { 
            display: inline-block;
            background-color: #1e2538;
            color: #ffaa73; 
            font-size: 13px; 
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 8px;
            margin-bottom: 20px; 
        }

        .btn { 
            display: block; 
            background: linear-gradient(90deg, #ff0055 0%, #ff4500 100%); 
            color: white; 
            text-align: center; 
            padding: 14px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
            border: none;
        }

        .btn:hover { 
            box-shadow: 0 0 25px #ff4500;
        }

        /* Oyun tapılmayanda çıxan xəbərdarlıq vizualı */
        #no-results {
            text-align: center;
            font-size: 20px;
            color: #ffaa73;
            margin-top: 50px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ODLAR YURDU STORE</div>
        <div class="subtitle">🔥 Global Fake PKG Ecosystem 🔥</div>
    </header>

    <!-- Axtarış Paneli Konteyneri -->
    <div class="search-container">
        <input type="text" id="search-box" class="search-box" placeholder="Oyun adı və ya CUSA kodu yazın..." onkeyup="searchGames()">
    </div>

    <!-- Oyunlar Siyahısı -->
    <div class="grid" id="main-grid"></div>
    
    <!-- Oyun tapılmayanda görünəcək yazı -->
    <div id="no-results">❌ Təəssüf ki, axtardığınız oyun tapılmadı!</div>

    <script>
        // ARCHIVE.ORG-DAN TAPDIĞIN OYUNLARI BURA ƏLAVƏ ET
        const games = [
            {
                title: "Grand Theft Auto V",
                region: "EUR (CUSA00411)",
                size: "68.2 GB",
                icon: "🚗",
                url: "https://archive.org/download/bura-oz-gta-linkini-qoyursan.pkg"
            },
            {
                title: "Minecraft PS4 Edition",
                region: "USA (CUSA00265)",
                size: "1.4 GB",
                icon: "📦",
                url: "https://archive.org/download/bura-oz-minecraft-linkini-qoyursan.pkg"
            }
        ];

        // Kartları ekrana çıxarmaq
        const container = document.getElementById('main-grid');
        games.forEach(g => {
            container.innerHTML += `
                <div class="card">
                    <div class="card-banner">${g.icon}</div>
                    <div class="card-content">
                        <div class="title" title="${g.title}">${g.title}</div>
                        <div class="meta">${g.region} | 💾 ${g.size}</div>
                        <a href="${g.url}" target="_blank" class="btn">DOWNLOAD FPKG</a>
                    </div>
                </div>
            `;
        });

        // 🔥 PEŞƏKAR CANLI AXTARIŞ FUNKSİYASI 🔥
        function searchGames() {
            const input = document.getElementById('search-box').value.toLowerCase();
            const cards = document.getElementsByClassName('card');
            let foundCount = 0;

            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].querySelector('.title').innerText.toLowerCase();
                const meta = cards[i].querySelector('.meta').innerText.toLowerCase();
                
                // Həm ada, həm də Region/CUSA koduna görə eyni anda axtarır
                if (title.includes(input) || meta.includes(input)) {
                    cards[i].style.display = "block";
                    foundCount++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            // Əgər heç bir oyun tapılmasa xəbərdarlıq yazısını göstərir
            const noResults = document.getElementById('no-results');
            if (foundCount === 0) {
                noResults.style.display = "block";
            } else {
                noResults.style.display = "none";
            }
        }
    </script>
</body>
</html>
