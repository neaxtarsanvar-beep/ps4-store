<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odlar Yurdu Store | Baku Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #00B5E2;  /* Azərbaycan Göyü */
            --secondary: #EF3340; /* Azərbaycan Qırmızısı */
            --accent: #509E2F;    /* Azərbaycan Yaşılı */
            --bg-dark: #05080f;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Urbanist', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 181, 226, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(239, 51, 64, 0.05) 0%, transparent 40%);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Naviqasiya Paneli */
        header {
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .brand i {
            font-size: 45px;
            color: var(--secondary);
            filter: drop-shadow(0 0 10px var(--secondary));
        }

        .brand h1 {
            font-size: 42px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #94a3b8;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Axtarış Bölməsi */
        .search-container {
            margin: 40px auto;
            width: 90%;
            max-width: 600px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 18px 30px;
            padding-left: 60px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: #fff;
            font-size: 18px;
            backdrop-filter: blur(10px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 181, 226, 0.2);
            transform: scale(1.02);
        }

        .search-container i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 20px;
        }

        /* Oyun Grid Sistemi */
        .container {
            width: 95%;
            max-width: 1400px;
            margin: 0 auto 100px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        /* Oyun Kartı */
        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            transition: 0.4s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .card-body {
            padding: 20px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .meta span i {
            margin-right: 5px;
            color: var(--primary);
        }

        .btn-download {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--primary), #0070d8);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-download:hover {
            filter: brightness(1.2);
            gap: 15px;
        }

        /* Yükləmə Ekranı Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(15px);
        }

        .loader-content {
            width: 80%;
            max-width: 500px;
            text-align: center;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 30px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), #ff6b6b);
            box-shadow: 0 0 20px var(--secondary);
            transition: width 0.1s;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Footer */
        footer {
            padding: 50px 20px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
        }

        .copyright {
            color: #475569;
            font-size: 14px;
        }

        .dev-tag {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <i class="fa-solid fa-fire-glow"></i>
            <h1>Odlar Yurdu Store</h1>
        </div>
        <div class="tagline">Baku Nexus Homebrew System</div>
    </header>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search" class="search-box" placeholder="Oyun, tətbiq və ya DLC axtar..." onkeyup="filterGames()">
    </div>

    <main class="container">
        <div class="grid" id="game-grid">
            </div>
    </main>

    <div id="download-overlay" class="overlay">
        <div class="loader-content">
            <i class="fa-solid fa-cloud-arrow-down" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 id="dl-title">Oyun Hazırlanır...</h2>
            <p id="dl-status" style="color: #94a3b8;">Xahiş edirik konsolu söndürməyin</p>
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div id="dl-percent" style="font-size: 24px; font-weight: 800;">0%</div>
            <button class="btn-cancel" onclick="closeDownload()">Ləğv et</button>
        </div>
    </div>

    <footer>
        <p class="copyright">Copyright © 2026 Baku Nexus Digital. All rights reserved.</p>
        <p style="font-size: 12px; color: #334155;">Developed with ❤️ by <a href="#" class="dev-tag">Ümüd</a></p>
    </footer>

    <script>
        let gamesData = [];

        // Oyunları çəkmək
        fetch('games.json')
            .then(res => res.json())
            .then(data => {
                gamesData = data;
                renderGames(gamesData);
            })
            .catch(err => {
                document.getElementById('game-grid').innerHTML = "<p style='text-align:center; width:100%; color:red;'>JSON faylı yüklənmədi. GitHub linkinizi yoxlayın.</p>";
            });

        function renderGames(games) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            
            games.forEach(game => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${game.image}" alt="${game.title}">
                        <div class="card-body">
                            <h3>${game.title}</h3>
                            <div class="meta">
                                <span><i class="fa-solid fa-database"></i>${game.size}</span>
                                <span><i class="fa-solid fa-layer-group"></i>${game.category}</span>
                            </div>
                            <button class="btn-download" onclick="startDownload('${game.title}')">
                                <i class="fa-solid fa-download"></i> PKG YÜKLƏ
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function filterGames() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = gamesData.filter(g => g.title.toLowerCase().includes(query));
            renderGames(filtered);
        }

        function startDownload(title) {
            const overlay = document.getElementById('download-overlay');
            const progress = document.getElementById('progress');
            const percentText = document.getElementById('dl-percent');
            
            overlay.style.display = 'flex';
            document.getElementById('dl-title').innerText = title + " Yüklənir";
            
            let val = 0;
            const interval = setInterval(() => {
                val += 1;
                progress.style.width = val + '%';
                percentText.innerText = val + '%';
                
                if(val >= 100) {
                    clearInterval(interval);
                    document.getElementById('dl-status').innerText = "Yükləmə tamamlandı! Oyun siyahısına əlavə edildi.";
                }
            }, 70); // Sürəti burdan tənzimlə

            // Intervalı saxlamaq üçün window-a bağlayırıq
            window.activeInterval = interval;
        }

        function closeDownload() {
            document.getElementById('download-overlay').style.display = 'none';
            document.getElementById('progress').style.width = '0%';
            clearInterval(window.activeInterval);
        }
    </script>
</body>
</html>
